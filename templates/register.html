{% extends "base.html" %}
{% block title %}Register — BookMyMovie{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-screen pb-20">
  <div class="bg-gray-900 bg-opacity-80 border border-gray-700 rounded-2xl p-8 w-full max-w-md shadow-2xl">
    <h2 class="text-2xl font-bold text-center mb-2">Create Account 🎬</h2>
    <p class="text-gray-400 text-center text-sm mb-6">Join BookMyMovie today</p>
    <form method="POST">
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">First Name</label>
          <input type="text" name="fname" required placeholder="John"
            class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-red-500">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Last Name</label>
          <input type="text" name="lname" required placeholder="Doe"
            class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-red-500">
        </div>
      </div>
      <div class="mb-4">
        <label class="block text-sm text-gray-400 mb-1">Email</label>
        <input type="email" name="email" required placeholder="you@example.com"
          class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-red-500">
      </div>
      <div class="mb-4">
        <label class="block text-sm text-gray-400 mb-1">Mobile Number</label>
        <input type="text" name="mobile" required placeholder="9876543210"
          class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-red-500">
      </div>
      <div class="mb-6">
        <label class="block text-sm text-gray-400 mb-1">Password</label>
        <input type="password" name="password" required placeholder="Min. 6 characters"
          class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-red-500">
      </div>
      <button type="submit" class="w-full btn-red rounded-lg py-3 text-base font-semibold">Create Account</button>
    </form>
    <p class="text-center text-gray-400 text-sm mt-5">
      Already have an account? <a href="{{ url_for('login') }}" class="text-red-400 hover:text-red-300 font-medium">Log In</a>
    </p>
  </div>
</div>
{% endblock %}
